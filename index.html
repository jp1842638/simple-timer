<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Timer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Settings toggle (top-right corner) -->
  <button id="settings-toggle" class="settings-toggle" aria-label="Open settings">⚙️</button>

  <!-- Main timer -->
  <main class="container">
    <h1 class="title">Simple Timer</h1>

    <div id="timer-display" class="timer-display">00:00:00</div>

    <div class="time-inputs">
      <label>
        <input type="number" id="input-hours" min="0" max="99" value="0" />
        <span>Hours</span>
      </label>
      <label>
        <input type="number" id="input-minutes" min="0" max="59" value="0" />
        <span>Minutes</span>
      </label>
      <label>
        <input type="number" id="input-seconds" min="0" max="59" value="0" />
        <span>Seconds</span>
      </label>
      <button id="btn-set" class="btn btn-secondary">Set</button>
    </div>

    <div class="controls">
      <button id="btn-start" class="btn btn-primary">Start</button>
      <button id="btn-pause" class="btn btn-secondary">Pause</button>
      <button id="btn-reset" class="btn btn-secondary">Reset</button>
    </div>
  </main>

  <!-- Settings panel -->
  <aside id="settings-panel" class="settings-panel" aria-hidden="true">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="settings-close" class="settings-close" aria-label="Close settings">✕</button>
    </div>

    <section class="settings-section">
      <h3>Theme</h3>
      <div class="theme-grid">
        <button class="theme-btn" data-theme="dark" title="Dark" aria-label="Dark theme"></button>
        <button class="theme-btn" data-theme="light" title="Light" aria-label="Light theme"></button>
        <button class="theme-btn" data-theme="dark-pink" title="Dark Pink" aria-label="Dark Pink theme"></button>
        <button class="theme-btn" data-theme="light-pink" title="Light Pink" aria-label="Light Pink theme"></button>
        <button class="theme-btn" data-theme="dark-blue" title="Dark Blue" aria-label="Dark Blue theme"></button>
        <button class="theme-btn" data-theme="light-blue" title="Light Blue" aria-label="Light Blue theme"></button>
      </div>
    </section>

    <section class="settings-section">
      <h3>Custom Colors</h3>
      <div class="color-picker-row">
        <label>Background</label>
        <input type="color" id="color-bg" />
      </div>
      <div class="color-picker-row">
        <label>Text</label>
        <input type="color" id="color-text" />
      </div>
      <div class="color-picker-row">
        <label>Accent (Buttons)</label>
        <input type="color" id="color-accent" />
      </div>
    </section>

    <section class="settings-section">
      <h3>Notifications</h3>
      <div class="toggle-row">
        <label for="toggle-notifications">🔔 Enable system notifications</label>
        <label class="switch">
          <input type="checkbox" id="toggle-notifications" />
          <span class="slider"></span>
        </label>
      </div>
      <p id="notif-status" class="notif-status">Off</p>
    </section>

    <section class="settings-section">
      <button id="btn-reset-theme" class="btn btn-secondary full-width">Reset to Default</button>
    </section>
  </aside>

  <div id="settings-overlay" class="settings-overlay"></div>

  <script src="script.js"></script>
</body>
</html>
